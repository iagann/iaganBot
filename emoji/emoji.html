<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
    :root {
        --anim-speed: 0.4s;
        /* Яркая палитра: фиолетовый, синий, бирюза */
        --c1: #ff0080; 
        --c2: #7928ca;
        --c3: #0070f3;
        --c4: #00dfd8;
    }

    body { 
        margin: 0; padding: 0; 
        background: transparent !important;
        overflow: hidden; 
        font-family: "Inter", "Segoe UI", sans-serif;
        height: 100vh; 
        display: flex; flex-direction: column; 
        justify-content: flex-end; 
        align-items: flex-end; 
    }

    #log-container { 
        padding: 10px; 
        width: 100%; 
        display: flex; 
        flex-direction: column; 
        align-items: flex-end; 
    }

    .chat-line {
        /* ЭФФЕКТНЫЙ ГРАДИЕНТ */
        background: linear-gradient(-45deg, var(--c1), var(--c2), var(--c3), var(--c4));
        background-size: 400% 400%;
        
        /* СИНХРОНИЗАЦИЯ: Фиксируем фон относительно окна */
        background-attachment: fixed; 
        /* Ускоряем анимацию до 5 секунд для драйва */
        animation: 
            megaGradient 5s ease infinite -100s, 
            slideIn var(--anim-speed) cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        
        border-right: 4px solid #fff; 
        backdrop-filter: blur(5px);
        padding: 8px 14px;
        margin-bottom: 6px;
        border-radius: 8px;
        
        width: auto;
        max-width: 65%;
        min-width: 150px;
        
        display: flex;
        flex-direction: column;
        color: white;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        position: relative;
        overflow: hidden;
    }

    /* Наложение для глубины и читаемости текста */
    .chat-line::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5));
        z-index: 0;
    }

    .line-header, .message-text {
        position: relative;
        z-index: 1;
    }

    .line-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 3px;
        margin-bottom: 4px;
    }

    .username {
        font-weight: 900;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        /* Контурный текст для максимальной читаемости */
        text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    }

    .emoji-badge {
        font-size: 24px;
        filter: drop-shadow(0 0 5px white);
        animation: activeEmoji 1s infinite alternate;
    }

    .message-text {
        color: #ffffff;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.2;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    /* БЫСТРЫЙ И СОЧНЫЙ ПЕРЕЛИВ */
    @keyframes megaGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes slideIn {
        0% { opacity: 0; transform: translateX(100px) scale(0.8); }
        100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes activeEmoji {
        from { transform: scale(1); }
        to { transform: scale(1.2); }
    }
</style>
</head>
<body>
    <div id="log-container"></div>

    <script>
        const socket = io("http://localhost:3008");
        const container = document.getElementById('log-container');
        const MAX_MESSAGES = 40; // Чуть уменьшили лимит, чтобы не перегружать экран

        // Функция корректировки цвета (из прошлого шага)
        function getReadableColor(hex) {
            if (!hex) return '#00f2ff'; // Твой фирменный цвет по умолчанию
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            let brightness = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            if (brightness < 90) {
                r = Math.min(255, r + 110); g = Math.min(255, g + 110); b = Math.min(255, b + 110);
                return `rgb(${r}, ${g}, ${b})`;
            }
            return hex;
        }

        socket.on('chatMessage', (data) => {
            const line = document.createElement('div');
            line.className = 'chat-line';

            const safeColor = getReadableColor(data.color);

            line.innerHTML = `
                <div class="line-header">
                    <span class="username" style="color: ${safeColor}">${data.username}</span>
                    <span class="emoji-badge">${data.emoji}</span>
                </div>
                <div class="message-text">${data.text}</div>
            `;

            container.appendChild(line);

            const currentLines = container.getElementsByClassName('chat-line');
            if (currentLines.length > MAX_MESSAGES) {
                container.removeChild(currentLines[0]);
            }
            
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
