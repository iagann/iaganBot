<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Death Counter</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            overflow: hidden; font-family: 'Consolas', monospace;
            display: flex; justify-content: flex-start; align-items: flex-start;
        }

        #death-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #FC4214; /* Красная рамка для опасности */
            border-left-width: 8px;    /* Жирный акцент слева */
            padding: 10px 20px;
            color: #FC4214;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
            min-width: 150px;
        }

        .label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .count {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        /* Небольшая пульсация при изменении числа */
        .update-flash {
            animation: flash 0.5s ease-out;
        }

        @keyframes flash {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body>

    <div id="death-card">
        <div class="label">Total Deaths</div>
        <div id="count" class="count">0</div>
    </div>

    <script>
        const socket = io("http://localhost:3007");
        const countElement = document.getElementById('count');
        let currentDeaths = 0;

        socket.on('deathUpdate', (data) => {
            const newDeaths = parseInt(data);
            if (!isNaN(newDeaths)) {
                // Если число изменилось, добавляем эффект вспышки
                if (newDeaths !== currentDeaths) {
                    countElement.classList.remove('update-flash');
                    void countElement.offsetWidth; // Триггер рефлоу
                    countElement.classList.add('update-flash');
                    currentDeaths = newDeaths;
                }
                countElement.textContent = newDeaths;
            }
        });
    </script>
</body>
</html>
